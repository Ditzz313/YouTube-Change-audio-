<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noval AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#0f172a,#1e293b,#334155);color:#fff;min-height:100vh}
.header{display:flex;gap:8px;padding:12px;background:#020617}
button{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;padding:12px;border-radius:14px;color:#fff;font-weight:bold;cursor:pointer}
input{flex:1;padding:12px;border:none;outline:none;border-radius:14px;background:#1e293b;color:#fff}
.video{height:220px;margin:12px;background:#000;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
iframe{width:100%;height:100%;border:none}
.chatWrap{padding:12px}
.messages{height:55vh;overflow:auto;background:#111827;padding:18px;border-radius:20px;display:flex;flex-direction:column;gap:14px}
.bubbleRow{display:flex;gap:10px;align-items:flex-end;animation:fade .3s ease;width:100%}
.userRow{justify-content:flex-end}
.aiRow{justify-content:flex-start}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 14px rgba(56,189,248,.25)}
.bubble{padding:14px 18px;max-width:72%;border-radius:20px;word-wrap:break-word;line-height:1.5;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.18)}
.userBubble{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border-bottom-right-radius:6px;color:#fff}
.aiBubble{background:#1f2937;border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:6px;color:#e5e7eb}
.inputArea{display:flex;gap:8px;margin-top:12px;background:#111827;padding:10px;border-radius:18px;border:1px solid rgba(255,255,255,.05);box-shadow:0 6px 20px rgba(0,0,0,.18)}
.fileWrap{width:50px;height:50px;background:#1e293b;border-radius:15px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.fileWrap input{position:absolute;width:100%;height:100%;opacity:0}
.typing span{animation:blink 1.4s infinite;font-size:20px}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
img.preview{max-width:200px;border-radius:12px;margin-top:8px}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body><div class="header">
<button onclick="setVideo()">▶</button>
<input id="videoUrl" placeholder="Link YouTube...">
</div><div class="video" id="videoBox">Masukkan link YouTube...</div><div class="chatWrap">
<div class="messages" id="messages"></div>
<div class="inputArea">
<label class="fileWrap">📎<input type="file" id="file"></label>
<input id="msg" placeholder="Chat dengan AI..." onkeypress="if(event.key==='Enter')sendAI()">
<button onclick="sendAI()">Kirim</button>
</div>
</div><script>
const messages=document.getElementById('messages');

function getID(url){
if(url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
if(url.includes('v=')) return url.split('v=')[1].split('&')[0];
return null;
}

function setVideo(){
let id=getID(videoUrl.value);
videoBox.innerHTML=id?`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`:'❌ Link salah';
}

function addBubble(text,type,img=null){
let row=document.createElement('div');
row.className='bubbleRow ' + (type==='userBubble' ? 'userRow' : 'aiRow');
let avatar=type==='userBubble'?'🧑':'🤖';
row.innerHTML=`
${type==='aiBubble'?`<div class='avatar'>${avatar}</div>`:''}
<div class='bubble ${type}'>${text}${img?`<br><img src='${img}' class='preview'>`:''}</div>
${type==='userBubble'?`<div class='avatar'>${avatar}</div>`:''}
`;
messages.appendChild(row);
messages.scrollTop=messages.scrollHeight;
return row.querySelector('.bubble');
}

async function sendAI(){
let text=msg.value.trim();
let fileInput=file.files[0];
if(!text && !fileInput)return;

let imgData=null;
if(fileInput){
imgData=await new Promise(resolve=>{
let reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(fileInput);
});
}

addBubble(text || 'Mengirim file...','userBubble',imgData);
msg.value='';
file.value='';

let typing=addBubble('<div class="typing"><span>.</span><span>.</span><span>.</span></div>','aiBubble');

let lower=(text||'').toLowerCase();
let reply='';

if(lower.includes('web apa ini')){
reply='Ini web buatan Noval dengan fitur AI assistant keren 🔥';
}else if(lower.includes('owner')){
reply='Owner web ini adalah Noval 😎';
}else{
try{
const res=await fetch(`https://api.kriszzyy.xyz/ai/quillbot?text=${encodeURIComponent(text)}`);
const data=await res.json();
reply=data.message || data.result || data.reply || 'AI tidak merespon';
}catch(err){
reply='AI sedang error / API bermasalah';
}
}

typing.innerHTML='';
let i=0;
let interval=setInterval(()=>{
if(i<reply.length){
typing.innerHTML+=reply.charAt(i);
messages.scrollTop=messages.scrollHeight;
i++;
}else clearInterval(interval);
},25);
}
</script></body>
</html>
