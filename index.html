<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobar Ultimate</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#fff;
}

/* HEADER */
.header{
    display:flex;
    gap:5px;
    padding:10px;
    background:#020617;
}

button{
    background:#38bdf8;
    border:none;
    padding:10px;
    cursor:pointer;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

/* VIDEO */
.video{
    height:220px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

iframe{
    width:100%;
    height:100%;
}

/* CHAT */
.chat{
    height:calc(100vh - 280px);
    display:flex;
    flex-direction:column;
}

.messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    position:relative;
}

.msg b{ color:#38bdf8; }
.tag{ color:yellow; }
.react{ cursor:pointer; font-size:12px; }

/* ACTION */
.actions{
    position:absolute;
    right:10px;
    top:5px;
    font-size:12px;
    cursor:pointer;
}

/* INPUT */
.input{
    display:flex;
}

.file{
    width:40px;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:250px;
    height:100%;
    background:#020617;
    transform:translateX(-100%);
    transition:0.3s;
    padding:15px;
    z-index:1000;
}

.sidebar.active{ transform:translateX(0); }

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:999;
}
.overlay.active{ display:block; }

.side-header{
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
    <button onclick="openMenu()">☰</button>
    <input id="videoUrl" placeholder="Link YouTube...">
    <button onclick="setVideo()">Play</button>
</div>

<div class="video" id="videoBox">
    Masukkan link YouTube...
</div>

<div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
        <input type="file" id="file" class="file">
        <input id="msg" placeholder="Ketik pesan...">
        <button onclick="send()">Kirim</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="side-header">
        <h3>Users</h3>
        <button onclick="closeMenu()">✖</button>
    </div>
    <button onclick="changeName()">Ganti Nama</button>
    <div id="users"></div>
</div>

<script>
const channel = new BroadcastChannel("chat_app");

// USER
let name = localStorage.getItem("name") || prompt("Nama:");
if(!name) name = "User"+Math.floor(Math.random()*999);
localStorage.setItem("name", name);

// USERS LIST
let users = JSON.parse(localStorage.getItem("users")||"[]");
if(!users.includes(name)){
    users.push(name);
    localStorage.setItem("users", JSON.stringify(users));
}

function renderUsers(){
    let data = JSON.parse(localStorage.getItem("users")||"[]");
    usersDiv.innerHTML = data.map(u=>`<div>🟢 ${u}</div>`).join("");
}
renderUsers();

// SIDEBAR
function openMenu(){
    sidebar.classList.add("active");
    overlay.classList.add("active");
}
function closeMenu(){
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

// CHAT
msg.addEventListener("keydown", e=>{
    if(e.key==="Enter") send();
});

function send(){
    let text = msg.value;
    let fileInput = file.files[0];

    if(!text && !fileInput) return;

    if(fileInput){
        let reader = new FileReader();
        reader.onload = ()=>{
            pushMessage(text, reader.result);
        };
        reader.readAsDataURL(fileInput);
    } else {
        pushMessage(text, null);
    }

    msg.value="";
    file.value="";
}

function pushMessage(text,img){
    let data = {
        id:Date.now(),
        name,
        text,
        img,
        like:0
    };

    channel.postMessage({type:"chat",data});
    addMessage(data);
}

function addMessage(d){
    let text = d.text.replace(/@\\w+/g, t=>`<span class='tag'>${t}</span>`);

    let div = document.createElement("div");
    div.className="msg";
    div.id=d.id;

    div.innerHTML = `
        <div class="actions" onclick="del(${d.id})">🗑️</div>
        <b>${d.name}</b><br>
        ${text || ""}
        ${d.img ? `<br><img src="${d.img}" width="100%">` : ""}
        <br>
        <span class="react" onclick="like(this)">👍 ${d.like}</span>
    `;

    messages.appendChild(div);
    div.scrollIntoView();

    // notifikasi
    if(document.hidden){
        document.title = "Pesan baru!";
    }
}

// DELETE
function del(id){
    let el = document.getElementById(id);
    if(el) el.remove();
}

// LIKE
function like(el){
    let n = parseInt(el.innerText.split(" ")[1]);
    el.innerText = "👍 "+(n+1);
}

// VIDEO
function getID(url){
    try{
        if(url.includes("youtu.be/"))
            return url.split("youtu.be/")[1].split("?")[0];
        if(url.includes("v="))
            return url.split("v=")[1].split("&")[0];
    }catch{}
    return null;
}

function setVideo(){
    let url = videoUrl.value;
    channel.postMessage({type:"video",url});
    play(url);
}

function play(url){
    let id = getID(url);
    if(!id){
        videoBox.innerHTML="❌ Link salah";
        return;
    }

    videoBox.innerHTML =
        `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`;
}

// CHANGE NAME
function changeName(){
    let newName = prompt("Nama baru:");
    if(newName){
        name = newName;
        localStorage.setItem("name", name);
        alert("Nama diganti!");
    }
}

// RECEIVE
channel.onmessage = (e)=>{
    if(e.data.type==="chat") addMessage(e.data.data);
    if(e.data.type==="video") play(e.data.url);
};
</script>

</body>
</html>
