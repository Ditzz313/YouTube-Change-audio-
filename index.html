<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1220;
color:#e6f0ff;
overflow-x:hidden;
}

/* HEADER */
.header{
display:flex;
gap:8px;
padding:12px;
background:#111a2e;
border-bottom:1px solid #223;
position:sticky;
top:0;
z-index:10;
}

.header input{
flex:1;
min-width:0;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1b2a44;
color:#fff;
}

button{
background:#4da3ff;
border:none;
padding:12px 14px;
border-radius:12px;
color:#fff;
font-weight:bold;
cursor:pointer;
flex-shrink:0;
}

/* VIDEO */
.video{
height:220px;
margin:12px;
background:#000;
border-radius:16px;
overflow:hidden;
border:1px solid #223;
}

/* CHAT */
.chatWrap{
padding:12px;
max-width:1000px;
margin:auto;
}

.messages{
height:60vh;
overflow-y:auto;
background:#111a2e;
padding:16px;
border-radius:16px;
display:flex;
flex-direction:column;
gap:12px;
border:1px solid #223;
}

/* ROW */
.row{
display:flex;
align-items:flex-end;
gap:10px;
}

/* ALIGN */
.userRow{justify-content:flex-end;}
.aiRow{justify-content:flex-start;}

/* PP */
.pp{
width:34px;
height:34px;
border-radius:50%;
background:#4da3ff;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
flex-shrink:0;
}

/* BUBBLE */
.bubble{
padding:12px 14px;
max-width:70%;
border-radius:14px;
word-break:break-word;
line-height:1.5;
}

.user{
background:#4da3ff;
color:#fff;
border-bottom-right-radius:4px;
}

.ai{
background:#1b2a44;
color:#e6f0ff;
border:1px solid #223;
border-bottom-left-radius:4px;
}

/* TIME */
.time{
font-size:10px;
opacity:.6;
margin-top:4px;
text-align:right;
}

/* INPUT */
.inputArea{
display:flex;
gap:10px;
margin-top:12px;
padding:10px;
background:#111a2e;
border-radius:16px;
border:1px solid #223;
align-items:center;
}

.inputArea input{
flex:1;
min-width:0;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1b2a44;
color:#fff;
}

/* FILE */
.fileBtn{
background:#4da3ff;
padding:12px 14px;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.fileBtn input{display:none}

/* TYPING ANIMATION */
.typing{
display:flex;
gap:4px;
align-items:center;
height:18px;
}

.dot{
width:6px;
height:6px;
background:#4da3ff;
border-radius:50%;
animation:blink 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.2; transform:translateY(0)}
40%{opacity:1; transform:translateY(-4px)}
}

/* CODE BOX */
.codeBox{
position:relative;
background:#0a0f1c;
border:1px solid #223;
padding:14px;
border-radius:12px;
overflow:auto;
margin-top:6px;
font-family:monospace;
white-space:pre;
}

/* COPY BUTTON */
.copyBtn{
position:absolute;
top:6px;
right:6px;
background:#4da3ff;
border:none;
padding:6px 10px;
font-size:12px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<input id="videoUrl" placeholder="Paste link / cari YouTube...">
<button onclick="handleVideo()">Play</button>
</div>

<div class="video" id="videoBox"></div>

<div class="chatWrap">
<div class="messages" id="messages"></div>

<div class="inputArea">
<label class="fileBtn">📎
<input type="file" id="file">
</label>

<input id="msg" placeholder="Chat dengan AI..." onkeypress="if(event.key==='Enter')sendAI()">

<button onclick="sendAI()">Kirim</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");
const msg=document.getElementById("msg");
const file=document.getElementById("file");
const videoBox=document.getElementById("videoBox");
const videoUrl=document.getElementById("videoUrl");

/* JAM */
function getTime(){
let d=new Date();
return d.getHours().toString().padStart(2,'0')+":"+
d.getMinutes().toString().padStart(2,'0');
}

/* YT ID */
function getID(url){
if(!url) return null;
if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
return null;
}

/* VIDEO */
async function handleVideo(){
let input=videoUrl.value.trim();

let id=getID(input);
if(id){
videoBox.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`;
return;
}

try{
const res=await fetch(`https://api.kriszzyy.xyz/search/youtube?q=${encodeURIComponent(input)}`);
const data=await res.json();

let first=data?.result?.[0]||data?.items?.[0]||data?.data?.[0];
let vid=first?.videoId||first?.id||first?.video_id;

if(vid){
videoBox.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1"></iframe>`;
}else videoBox.innerHTML="❌ Tidak ditemukan";

}catch(e){
videoBox.innerHTML="❌ Error";
}
}

/* ADD MESSAGE */
function addMessage(text,type){

let processed=text;

/* detect code block */
if(typeof processed==="string" && processed.includes("```")){
processed=processed.replace(/```([\s\S]*?)```/g,(m,code)=>{
return `
<div class="codeBox">
<button class="copyBtn" onclick="copyCode(this)">Salin</button>
<pre>${code}</pre>
</div>`;
});
}

let row=document.createElement("div");
row.className="row "+(type==="user"?"userRow":"aiRow");

let pp=document.createElement("div");
pp.className="pp";
pp.innerText=type==="user"?"U":"AI";

let bubble=document.createElement("div");
bubble.className="bubble "+type;

bubble.innerHTML=processed+`<div class="time">${getTime()}</div>`;

if(type==="user"){
row.appendChild(bubble);
row.appendChild(pp);
}else{
row.appendChild(pp);
row.appendChild(bubble);
}

messages.appendChild(row);
messages.scrollTop=messages.scrollHeight;

return bubble;
}

/* COPY CODE */
function copyCode(btn){
let code=btn.parentElement.querySelector("pre").innerText;
navigator.clipboard.writeText(code);
btn.innerText="✔";
setTimeout(()=>btn.innerText="Salin",1200);
}

/* TYPING */
function typingIndicator(){
let row=document.createElement("div");
row.className="row aiRow";

let pp=document.createElement("div");
pp.className="pp";
pp.innerText="AI";

let bubble=document.createElement("div");
bubble.className="bubble ai";

bubble.innerHTML=`
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

row.appendChild(pp);
row.appendChild(bubble);

messages.appendChild(row);
messages.scrollTop=messages.scrollHeight;

return bubble;
}

/* CHAT */
async function sendAI(){
let text=msg.value.trim();
if(!text && !file.files[0]) return;

/* OWNER DETECT */
if(/owner|pembuat|siapa buat|who made/i.test(text)){
addMessage("Owner web ini adalah Noval 😎","ai");
msg.value="";
file.value="";
return;
}

addMessage(text||"file terkirim","user");

msg.value="";
file.value="";

let load=typingIndicator();

try{
const res=await fetch(`https://api.kriszzyy.xyz/ai/quillbot?text=${encodeURIComponent(text)}`);
const data=await res.json();

setTimeout(()=>{
load.innerHTML=data.message+`<div class="time">${getTime()}</div>`;
messages.scrollTop=messages.scrollHeight;
},800);

}catch(e){
load.innerHTML="AI error";
}
}
</script>

</body>
</html>
