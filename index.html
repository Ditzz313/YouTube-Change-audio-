<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALRYZ PLAYER PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(180deg,#020617,#0f172a,#1e293b);
padding:15px;
overflow-x:hidden;
color:white;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
background:rgba(255,255,255,.05);
padding:18px;
border-radius:28px;
backdrop-filter:blur(20px);
box-shadow:0 0 35px rgba(0,140,255,.35);
position:relative;
overflow:hidden;
}

/* TOP */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu-btn{
width:45px;
height:45px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR MENU */
.sidebar{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#0f172a;
padding:20px;
box-shadow:-5px 0 25px rgba(0,0,0,.4);
transition:.4s ease;
z-index:9999;
overflow-y:auto;
}

.sidebar.active{
right:0;
}

.sidebar h3{
margin-bottom:15px;
}

.history-item{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:12px;
font-size:13px;
cursor:pointer;
transition:.3s;
}

.history-item:hover{
background:#38bdf8;
}

/* VIDEO */
.video-wrap{
width:100%;
aspect-ratio:9/16;
border-radius:25px;
overflow:hidden;
background:black;
box-shadow:0 0 25px rgba(59,130,246,.3);
}

iframe{
width:100%;
height:100%;
border:none;
}

/* SUBTITLE */
.subtitle{
margin-top:15px;
padding:14px;
background:#0f172a;
border-radius:18px;
text-align:center;
font-size:15px;
}

/* SEARCH */
.search-box{
display:flex;
gap:10px;
margin-top:15px;
width:100%;
}

.search-box input{
flex:1;
min-width:0;
padding:16px;
border:none;
border-radius:18px;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
}

.play-btn{
padding:0 22px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
white-space:nowrap;
box-shadow:0 0 20px rgba(56,189,248,.5);
transition:.3s;
}

.play-btn:hover{
transform:scale(1.05);
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
z-index:999;
}

.overlay.active{
display:block;
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
<h3>📜 History Video</h3>
<div id="historyList"></div>
</div>

<div class="container">

<div class="topbar">
<div class="logo">🎥 PALRYZ</div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div class="video-wrap">
<iframe id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ?cc_load_policy=1"
allowfullscreen></iframe>
</div>

<div class="subtitle">
🎵 Subtitle akan muncul otomatis jika video support caption
</div>

<div class="search-box">
<input id="query" placeholder="Paste link YouTube disini...">
<button class="play-btn" onclick="playVideo()">▶ Putar</button>
</div>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function getID(url){
let reg=/(?:youtu\\.be\\/|watch\\?v=|embed\\/)([a-zA-Z0-9_-]{11})/;
let m=url.match(reg);
return m?m[1]:null;
}

function playVideo(){
let q=document.getElementById("query").value.trim();
let id=getID(q);

if(!id){
alert("Masukkan link YouTube valid!");
return;
}

document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1&cc_load_policy=1`;

saveHistory(q);
}

function saveHistory(link){
let data=JSON.parse(localStorage.getItem("ytHistory")||"[]");

data.unshift(link);
data=[...new Set(data)].slice(0,8);

localStorage.setItem("ytHistory",JSON.stringify(data));

renderHistory();
}

function renderHistory(){
let data=JSON.parse(localStorage.getItem("ytHistory")||"[]");

let html="";

if(!data.length){
html="<small>Belum ada history</small>";
}else{
data.forEach(item=>{
html+=`<div class="history-item" onclick="reuse('${item}')">${item}</div>`;
});
}

document.getElementById("historyList").innerHTML=html;
}

function reuse(link){
document.getElementById("query").value=link;
playVideo();
toggleMenu();
}

renderHistory();
</script>

</body>
  </html>
