<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nobar Ultimate AI API</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#0f172a,#1e293b,#334155);color:#fff;min-height:100vh}
.header{display:flex;gap:8px;padding:12px;background:rgba(2,6,23,.9);backdrop-filter:blur(15px)}
button{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border:none;padding:12px;border-radius:14px;cursor:pointer;color:#fff;font-weight:bold}
input{flex:1;padding:12px;border:none;outline:none;border-radius:14px;background:#1e293b;color:#fff}
.video{height:220px;margin:12px;background:#000;border-radius:20px;overflow:hidden;display:flex;align-items:center;justify-content:center}
iframe{width:100%;height:100%;border:none}
.aiBox{margin:12px;background:#1e293b;padding:15px;border-radius:20px}
.chat{height:calc(100vh - 380px);display:flex;flex-direction:column;padding:12px}
.messages{flex:1;overflow:auto}
.msg{background:#1e293b;padding:14px;border-radius:16px;margin-bottom:10px}
.inputArea{display:flex;gap:8px;margin-top:10px;background:#0f172a;padding:10px;border-radius:18px}
.fileWrap{width:50px;height:50px;background:#1e293b;border-radius:15px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.fileWrap input{position:absolute;width:100%;height:100%;opacity:0}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100%;background:#020617;padding:15px;transform:translateX(-100%);transition:.3s;z-index:1000}
.sidebar.active{transform:translateX(0)}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;z-index:999}
.overlay.active{display:block}
.sideTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.closeBtn{background:red;padding:8px 12px;border-radius:10px}
</style>
</head>
<body><div class="header">
<button onclick="openMenu()">☰</button>
<input id="videoUrl" placeholder="Link YouTube...">
<button onclick="setVideo()">▶</button>
</div><div class="video" id="videoBox">Masukkan link YouTube...</div><div class="aiBox">
<h3>🤖 AI Chat API</h3><br>
<input id="aiInput" placeholder="Tanya AI...">
<button onclick="askAI()">Kirim AI</button>
<p id="aiReply" style="margin-top:10px;color:#38bdf8"></p>
</div><div class="chat">
<div class="messages" id="messages"></div>
<div class="inputArea">
<label class="fileWrap">📎<input type="file" id="file"></label>
<input id="msg" placeholder="Ketik pesan...">
<button onclick="send()">Kirim</button>
</div>
</div><div class="overlay" id="overlay" onclick="closeMenu()"></div><div class="sidebar" id="sidebar">
<div class="sideTop">
<h3>Users</h3>
<button class="closeBtn" onclick="closeMenu()">✖</button>
</div>
<button onclick="changeName()">Ganti Nama</button>
<div id="users"></div>
</div><script>
const channel=new BroadcastChannel('chat_app');
let name=localStorage.getItem('name')||prompt('Nama:')||'User';
localStorage.setItem('name',name);
let users=JSON.parse(localStorage.getItem('users')||'[]');
if(!users.includes(name)){users.push(name);localStorage.setItem('users',JSON.stringify(users));}
document.getElementById('users').innerHTML=users.map(u=>`<div>🟢 ${u}</div>`).join('');

function openMenu(){sidebar.classList.add('active');overlay.classList.add('active')}
function closeMenu(){sidebar.classList.remove('active');overlay.classList.remove('active')}

function send(){
let text=msg.value;
let fileInput=file.files[0];
if(!text&&!fileInput)return;
if(fileInput){
let reader=new FileReader();
reader.onload=()=>pushMessage(text,reader.result);
reader.readAsDataURL(fileInput);
}else pushMessage(text,null);
msg.value='';file.value='';
}

function pushMessage(text,img){
let data={id:Date.now(),name,text,img};
channel.postMessage({type:'chat',data});
addMessage(data);
}

function addMessage(d){
let div=document.createElement('div');
div.className='msg';
div.innerHTML=`<b>${d.name}</b><br>${d.text}${d.img?`<br><img src='${d.img}' width='100%' style='border-radius:10px'>`:''}`;
messages.appendChild(div);
div.scrollIntoView();
}

function getID(url){
if(url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
if(url.includes('v=')) return url.split('v=')[1].split('&')[0];
return null;
}

function setVideo(){
let id=getID(videoUrl.value);
videoBox.innerHTML=id?`<iframe src='https://www.youtube.com/embed/${id}?autoplay=1'></iframe>`:'❌ Link salah';
}

function changeName(){
let newName=prompt('Nama baru:');
if(newName){name=newName;localStorage.setItem('name',name)}
}

channel.onmessage=e=>{
if(e.data.type==='chat') addMessage(e.data.data)
}

async function askAI(){
let text=aiInput.value;
aiReply.innerText='Loading...';

try{
const res=await fetch('https://api.openai.com/v1/chat/completions',{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':'Bearer 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'
},
body:JSON.stringify({
model:'gpt-4o-mini',
messages:[{role:'user',content:text}]
})
});

const data=await res.json();
aiReply.innerText=data.choices?.[0]?.message?.content||'Tidak ada respon';
}catch(err){
aiReply.innerText='Error API / Cek API Key';
}
}
</script></body>
</html>
