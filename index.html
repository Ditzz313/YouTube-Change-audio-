<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalRyz Video Player Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
padding:15px;
color:white;
}

.container{
max-width:420px;
margin:auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:15px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* VIDEO */
.video-wrap{
width:100%;
aspect-ratio:9/16;
border-radius:25px;
overflow:hidden;
background:black;
position:relative;
box-shadow:0 0 20px rgba(56,189,248,0.3);
}

iframe{
width:100%;
height:100%;
border:none;
}

/* SUBTITLE BOX */
.subtitle-box{
margin-top:10px;
background:rgba(0,0,0,0.6);
padding:14px;
border-radius:15px;
text-align:center;
font-size:14px;
color:#fff;
min-height:50px;
border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
.search-area{
margin-top:18px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:16px;
outline:none;
font-size:14px;
background:#1e293b;
color:white;
box-shadow:inset 0 0 10px rgba(0,0,0,0.4);
}

button{
padding:15px 18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
color:#fff;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 15px rgba(56,189,248,0.4);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* HISTORY */
.history{
margin-top:15px;
padding:15px;
background:#0f172a;
border-radius:20px;
}

.history h3{
margin-bottom:10px;
}

.item{
background:#1e293b;
padding:10px;
margin-bottom:8px;
border-radius:12px;
font-size:13px;
cursor:pointer;
}

/* LOADING */
.loading{
position:absolute;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
z-index:5;
}
</style>
</head>
<body>

<div class="container">

<div class="video-wrap">
<div class="loading" id="loading">⏳ Loading...</div>
<iframe id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ?cc_load_policy=1"
allowfullscreen
onload="hideLoading()">
</iframe>
</div>

<div class="subtitle-box" id="subtitleBox">
🎵 Subtitle akan muncul otomatis jika video support caption
</div>

<div class="search-area">
<input id="query" placeholder="Paste link YouTube disini...">
<button onclick="playVideo()">▶ Putar</button>
</div>

<div class="history">
<h3>📜 History</h3>
<div id="historyList"></div>
</div>

</div>

<script>
function getID(url){
let reg=/(?:youtu\\.be\\/|watch\\?v=|embed\\/)([a-zA-Z0-9_-]{11})/;
let match=url.match(reg);
return match?match[1]:null;
}

function playVideo(){
let q=document.getElementById("query").value.trim();
if(!q)return;

let id=getID(q);

if(id){
document.getElementById("loading").style.display="flex";

document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1&cc_load_policy=1`;

saveHistory(q);
}else{
alert("Masukkan link YouTube valid!");
}
}

function hideLoading(){
document.getElementById("loading").style.display="none";
}

function saveHistory(link){
let data=JSON.parse(localStorage.getItem("historyYT")||"[]");

data.unshift(link);

data=[...new Set(data)].slice(0,5);

localStorage.setItem("historyYT",JSON.stringify(data));

renderHistory();
}

function renderHistory(){
let data=JSON.parse(localStorage.getItem("historyYT")||"[]");

let html="";

data.forEach(item=>{
html+=`<div class="item" onclick="reuse('${item}')">${item}</div>`;
});

document.getElementById("historyList").innerHTML=
html||"<small>Belum ada history</small>";
}

function reuse(val){
document.getElementById("query").value=val;
playVideo();
}

renderHistory();
</script>

</body>
</html>
